<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SUMMER WORKSHOP - Compare Artificial Intelligence</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      scroll-behavior:smooth;
    }

    body{
      font-family:'Poppins',sans-serif;
      background:#050816;
      color:white;
      overflow-x:hidden;
    }

    body::before{
      content:'';
      position:fixed;
      width:100%;
      height:100%;
      background:
      radial-gradient(circle at top left,#00f0ff20,transparent 30%),
      radial-gradient(circle at bottom right,#8a2be220,transparent 30%);
      z-index:-1;
    }

    nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 8%;
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(255,255,255,0.1);
      position:sticky;
      top:0;
      z-index:1000;
    }

    .logo{
      font-size:28px;
      font-family:'Orbitron',sans-serif;
      color:#00f0ff;
      font-weight:800;
    }

    nav ul{
      display:flex;
      gap:30px;
      list-style:none;
    }

    nav ul li a{
      color:white;
      text-decoration:none;
      transition:0.3s;
    }

    nav ul li a:hover{
      color:#00f0ff;
    }

    .hero{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:50px;
    }

    .hero-content h1{
      font-size:4rem;
      font-family:'Orbitron',sans-serif;
      background:linear-gradient(to right,#00f0ff,#8a2be2);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .hero-content p{
      max-width:800px;
      margin:20px auto;
      font-size:1.2rem;
      color:#c8c8c8;
    }

    .btn{
      background:linear-gradient(90deg,#00f0ff,#8a2be2);
      border:none;
      color:white;
      padding:15px 35px;
      border-radius:30px;
      cursor:pointer;
      font-size:1rem;
      font-weight:600;
      transition:0.3s;
    }

    .btn:hover{
      transform:translateY(-4px);
      box-shadow:0 0 20px #00f0ff;
    }

    section{
      padding:90px 8%;
    }

    .title{
      text-align:center;
      font-size:2.7rem;
      margin-bottom:50px;
      color:#00f0ff;
      font-family:'Orbitron';
    }

    .card-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
      gap:25px;
    }

    .card{
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:20px;
      padding:25px;
      transition:0.4s;
      backdrop-filter:blur(10px);
    }

    .card:hover{
      transform:translateY(-10px);
      border-color:#00f0ff;
      box-shadow:0 0 30px rgba(0,240,255,0.2);
    }

    .card h3{
      color:#00f0ff;
      margin-bottom:15px;
      font-size:1.6rem;
    }

    .pros{
      color:#62ff62;
      margin-top:10px;
    }

    .cons{
      color:#ff6a6a;
      margin-top:10px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      overflow:hidden;
      border-radius:15px;
    }

    table th,table td{
      padding:18px;
      text-align:center;
      border:1px solid rgba(255,255,255,0.1);
    }

    table th{
      background:#00f0ff20;
      color:#00f0ff;
    }

    table tr{
      background:rgba(255,255,255,0.04);
    }

    .output-box{
      background:#10182b;
      padding:20px;
      border-radius:15px;
      margin-bottom:20px;
      border-left:5px solid #00f0ff;
    }

    footer{
      text-align:center;
      padding:30px;
      border-top:1px solid rgba(255,255,255,0.1);
      color:#aaa;
    }

    @media(max-width:768px){
      .hero-content h1{
        font-size:2.7rem;
      }

      nav{
        flex-direction:column;
        gap:15px;
      }

      nav ul{
        flex-wrap:wrap;
        justify-content:center;
      }
    }
  </style>
</head>

<nav>
    <div class="logo">SUMMER WORKSHOP 2026</div>
    <ul>
